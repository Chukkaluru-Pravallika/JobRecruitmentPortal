<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💼 JobPortal Admin</a>
        <div class="ms-auto">
            <a href="/admin/jobs"
               class="btn btn-outline-light me-2">All Jobs</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
    <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"/>
    <button type="submit"
        class="btn btn-light">Logout</button>
</form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4>Admin Dashboard</h4>

    <!-- Stats -->
    <div class="row g-3 my-3">
        <div class="col-md-4">
            <div class="card bg-primary text-white text-center p-3">
                <h2 th:text="${totalSeekers}">0</h2>
                <p class="mb-0">Total Seekers</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white text-center p-3">
                <h2 th:text="${totalRecruiters}">0</h2>
                <p class="mb-0">Total Recruiters</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-white text-center p-3">
                <h2 th:text="${totalJobs}">0</h2>
                <p class="mb-0">Open Jobs</p>
            </div>
        </div>
    </div>

    <!-- Seekers Table -->
    <div class="card mt-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Job Seekers</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="seeker, i : ${seekers}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${seeker.fullName}"></td>
                        <td th:text="${seeker.email}"></td>
                        <td th:text="${seeker.phone}"></td>
                        <td>
                            <form th:action="@{/admin/users/
                                {id}/delete(id=${seeker.id})}"
                                  method="post">
                                <input type="hidden"
                                    th:name="${_csrf.parameterName}"
                                    th:value="${_csrf.token}"/>
                                <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm(
                                        'Delete this user?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Recruiters Table -->
    <div class="card mt-4">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Recruiters</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="recruiter, i : ${recruiters}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${recruiter.fullName}"></td>
                        <td th:text="${recruiter.email}"></td>
                        <td th:text="${recruiter.phone}"></td>
                        <td>
                            <form th:action="@{/admin/users/
                                {id}/delete(id=${recruiter.id})}"
                                  method="post">
                                <input type="hidden"
                                    th:name="${_csrf.parameterName}"
                                    th:value="${_csrf.token}"/>
                                <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm(
                                        'Delete this user?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
