<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - All Jobs</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💼 JobPortal Admin</a>
        <div class="ms-auto">
            <a href="/admin/dashboard"
               class="btn btn-outline-light me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
    <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"/>
    <button type="submit"
        class="btn btn-light">Logout</button>
</form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4>All Job Listings</h4>

    <div class="card mt-3">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-danger">
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Posted</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job, i : ${jobs}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${job.title}"></td>
                        <td th:text="${job.company.name}"></td>
                        <td th:text="${job.location}"></td>
                        <td th:text="${job.category}"></td>
                        <td>
                            <span th:text="${job.status}"
                                class="badge"
                                th:classappend="${job.status.name()
                                    == 'OPEN'} ? 'bg-success'
                                    : 'bg-secondary'">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(
                            job.postedAt, 'dd MMM yyyy')}"></td>
                        <td>
                            <form th:action="@{/admin/jobs/
                                {id}/delete(id=${job.id})}"
                                  method="post">
                                <input type="hidden"
                                    th:name="${_csrf.parameterName}"
                                    th:value="${_csrf.token}"/>
                                <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm(
                                        'Delete this job?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${jobs.empty}">
                        <td colspan="8"
                            class="text-center text-muted">
                            No jobs found.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
