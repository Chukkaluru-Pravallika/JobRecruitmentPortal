<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Dashboard</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            💼 JobPortal
        </a>
        <div class="ms-auto d-flex gap-2">
            <a href="/recruiter/companies"
               class="btn btn-outline-light">
                🏢 All Companies
            </a>
            <a href="/recruiter/jobs/post"
               class="btn btn-success">
                Post Job
            </a>
           <a href="/recruiter/company/new"
                   class="btn btn-primary">
                    + Add Company
                </a>
            <form th:action="@{/logout}"
                  method="post"
                  class="d-inline">
                <input type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"/>
                <button type="submit"
                    class="btn btn-light">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4>Welcome, <span th:text="${recruiter.fullName}"></span>! 🏢</h4>

    <!-- Stats -->
    <div class="row g-3 my-3">
        <div class="col-md-4">
            <div class="card bg-dark text-white text-center p-3">
                <h2 th:text="${totalJobs}">0</h2>
                <p class="mb-0">Jobs Posted</p>
            </div>
        </div>
    </div>

    <!-- Posted Jobs -->
    <div class="card mt-4">
        <div class="card-header d-flex justify-content-between">
            <h5 class="mb-0">My Job Listings</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover mb-0">
    <thead class="table-dark">
        <tr>
            <th class="ps-3">#</th>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Category</th>
            <th>Status</th>
            <th>Posted</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="job, i : ${jobs}">
            <td class="ps-3"
                th:text="${i.count}"></td>
            <td class="fw-bold"
                th:text="${job.title}"></td>
            <td>
                <span class="badge bg-dark"
                      th:text="${job.company.name}">
                </span>
            </td>
            <td th:text="${job.location}"></td>
            <td>
                <span class="badge bg-info"
                      th:text="${job.category}">
                </span>
            </td>
            <td>
                <span class="badge"
                    th:text="${job.status}"
                    th:classappend="${job.status.name()
                        == 'OPEN'}
                        ? 'bg-success'
                        : 'bg-secondary'">
                </span>
            </td>
            <td th:text="${#temporals.format(
                job.postedAt,
                'dd MMM yyyy')}">
            </td>
            <td>
                <div class="d-flex gap-1">
                    <a th:href="@{'/recruiter/jobs/'
                        + ${job.id} + '/applicants'}"
                       class="btn btn-primary btn-sm">
                        Applicants
                    </a>
                    <form th:action="@{'/recruiter/jobs/'
                        + ${job.id} + '/close'}"
                          method="post"
                          class="d-inline">
                        <input type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"/>
                        <button type="submit"
                            class="btn btn-warning btn-sm"
                            th:disabled="${job.status.name()
                                == 'CLOSED'}"
                            onclick="return confirm(
                                'Close this job?')">
                            Close
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        <tr th:if="${jobs.empty}">
            <td colspan="8"
                class="text-center text-muted py-4">
                No jobs posted yet.
                <a href="/recruiter/jobs/post">
                    Post your first job!
                </a>
            </td>
        </tr>
    </tbody>
</table>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
