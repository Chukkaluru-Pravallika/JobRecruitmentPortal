<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Applicants</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💼 JobPortal</a>
        <div class="ms-auto">
            <a href="/recruiter/dashboard"
               class="btn btn-outline-light me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
    <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"/>
    <button type="submit"
        class="btn btn-light">Logout</button>
</form>

        </div>
    </div>
</nav>

<div class="container py-4">
    <h4>Applicants for:
        <span th:text="${job.title}"></span>
    </h4>
    <p class="text-muted"
       th:text="${job.company.name}"></p>

    <div class="card mt-3">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Resume</th>
                        <th>Applied On</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app, i : ${applications}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${app.seeker.fullName}"></td>
                        <td th:text="${app.seeker.email}"></td>
                        <td th:text="${app.seeker.phone}"></td>
                        <td>
                            <a th:if="${app.seeker.resumePath != null}"
                               th:href="${app.seeker.resumePath}"
                               target="_blank"
                               class="btn btn-sm btn-outline-primary">
                                View
                            </a>
                            <span th:if="${app.seeker.resumePath == null}"
                                  class="text-muted">N/A</span>
                        </td>
                        <td th:text="${#temporals.format(
                            app.appliedAt, 'dd MMM yyyy')}"></td>
                        <td>
                            <span th:text="${app.status}"
                                class="badge"
                                th:classappend="${app.status.name()
                                    == 'APPLIED'} ? 'bg-secondary'
                                    : (${app.status.name()
                                    == 'SHORTLISTED'} ? 'bg-success'
                                    : (${app.status.name()
                                    == 'HIRED'} ? 'bg-primary'
                                    : 'bg-danger'))">
                            </span>
                        </td>
                        <td>
                            <form th:action="@{/recruiter/applications/
                                {id}/status(id=${app.id})}"
                                  method="post">
                                <input type="hidden"
                                    th:name="${_csrf.parameterName}"
                                    th:value="${_csrf.token}"/>
                                <input type="hidden"
                                    name="jobId"
                                    th:value="${job.id}"/>
                                <select name="status"
                                    class="form-select form-select-sm"
                                    onchange="this.form.submit()">
                                    <option
                                        th:selected="${app.status.name()
                                            == 'APPLIED'}"
                                        value="APPLIED">Applied</option>
                                    <option
                                        th:selected="${app.status.name()
                                            == 'SHORTLISTED'}"
                                        value="SHORTLISTED">
                                        Shortlisted</option>
                                    <option
                                        th:selected="${app.status.name()
                                            == 'HIRED'}"
                                        value="HIRED">Hired</option>
                                    <option
                                        th:selected="${app.status.name()
                                            == 'REJECTED'}"
                                        value="REJECTED">Rejected</option>
                                </select>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${applications.empty}">
                        <td colspan="8"
                            class="text-center text-muted">
                            No applicants yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
