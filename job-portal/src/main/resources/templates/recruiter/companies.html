<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Companies</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            💼 JobPortal
        </a>
        <div class="ms-auto d-flex gap-2">
            <a href="/recruiter/dashboard"
               class="btn btn-outline-light">
                Dashboard
            </a>
            <a href="/recruiter/jobs/post"
               class="btn btn-success">
                + Post Job
            </a>
            <a href="/recruiter/company/new"
               class="btn btn-outline-light">
                + Add Company
            </a>
            <form th:action="@{/logout}"
                  method="post"
                  class="d-inline">
                <input type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"/>
                <button type="submit"
                    class="btn btn-light">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex justify-content-between
                align-items-center mb-4">
        <h4 class="mb-0">🏢 All Companies</h4>
        <span class="badge bg-dark fs-6"
              th:text="${companies.size()}
                + ' Companies'">
        </span>
    </div>

    <!-- Company Cards -->
    <div class="row g-4">
        <div class="col-md-4"
             th:each="company : ${companies}">
            <div class="card h-100 shadow-sm
                        border-0">
                <div class="card-body p-4">

                    <!-- Company Initial Avatar -->
                    <div class="d-flex
                                align-items-center
                                mb-3">
                        <div class="bg-primary
                                    text-white
                                    rounded-circle
                                    d-flex
                                    align-items-center
                                    justify-content-center
                                    fw-bold me-3"
                             style="width:50px;
                                    height:50px;
                                    font-size:20px"
                             th:text="${#strings
                                .substring(
                                company.name,0,1)
                                .toUpperCase()}">
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold"
                                th:text="${company.name}">
                            </h5>
                            <small class="text-muted"
                                th:text="${company
                                    .location}">
                            </small>
                        </div>
                    </div>

                    <!-- Description -->
                    <p class="text-muted small mb-3"
                       th:text="${company.description}">
                    </p>

                    <!-- Website -->
                    <p class="mb-2">
                        <span class="text-muted small">
                            🌐 Website:
                        </span>
                        <a th:if="${company.website
                            != null and
                            !company.website.isEmpty()}"
                           th:href="${company.website}"
                           target="_blank"
                           class="text-primary small"
                           th:text="${company.website}">
                        </a>
                        <span th:if="${company.website
                            == null or
                            company.website.isEmpty()}"
                              class="text-muted small">
                            Not provided
                        </span>
                    </p>

                    <!-- Recruiter Name -->
                    <p class="mb-0">
                        <span class="text-muted small">
                            👤 Recruiter:
                        </span>
                        <span class="small fw-bold"
                              th:text="${company
                                .recruiter.fullName}">
                        </span>
                    </p>

                </div>

                <div class="card-footer bg-white
                            border-top pt-3">
                    <div class="d-flex gap-2">
                        <a href="/recruiter/jobs/post"
                           class="btn btn-primary
                                  btn-sm w-100">
                            📢 Post Job
                        </a>
                        <a th:href="@{'/recruiter/company/' + ${company.id} + '/edit'}"
   class="btn btn-warning btn-sm w-100">
    ✏️ Edit
</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- No companies -->
        <div th:if="${companies.empty}"
             class="col-12">
            <div class="alert alert-info
                        text-center py-5">
                <h5>No companies yet!</h5>
                <p class="mb-3">
                    Add your first company profile.
                </p>
                <a href="/recruiter/company/new"
                   class="btn btn-primary">
                    + Add Company
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="bg-light text-center py-3 mt-4">
    <p class="mb-0 text-muted">
        © 2024 JobPortal. All rights reserved.
    </p>
</footer>
<script src="/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
