<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seeker Dashboard</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💼 JobPortal</a>
        <div class="ms-auto">
            <a href="/seeker/profile"
               class="btn btn-outline-light me-2">
                Profile
            </a>
            <a href="/seeker/jobs"
               class="btn btn-outline-light">
                🔍 Browse Jobs
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
    <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"/>
    <button type="submit"
        class="btn btn-light">Logout</button>
</form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4>Welcome,
        <span th:text="${seeker.fullName}"></span>! 👋
    </h4>

    <!-- Success messages -->
    <div th:if="${param.applied}"
         class="alert alert-success">
        ✅ Applied successfully!
    </div>

    <!-- Stats -->
    <div class="row g-3 my-3">
        <div class="col-md-4">
            <div class="card bg-primary text-white text-center p-3">
                <h2 th:text="${applications.size()}">0</h2>
                <p class="mb-0">Total Applications</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white text-center p-3">
                <h2 th:text="${#lists.size(
                    applications.?[status.name() == 'SHORTLISTED']
                )}">0</h2>
                <p class="mb-0">Shortlisted</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-white text-center p-3">
                <h2 th:text="${#lists.size(
                    applications.?[status.name() == 'HIRED']
                )}">0</h2>
                <p class="mb-0">Hired</p>
            </div>
        </div>
    </div>

    <!-- Applications Table -->
    <div class="card mt-4">
        <div class="card-header d-flex justify-content-between
                    align-items-center">
            <h5 class="mb-0">My Applications</h5>
            <a href="/seeker/jobs"
               class="btn btn-primary btn-sm">
                Browse Jobs
            </a>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>#</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Applied On</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app, i : ${applications}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${app.job.title}"></td>
                        <td th:text="${app.job.company.name}"></td>
                        <td th:text="${app.job.location}"></td>
                        <td th:text="${#temporals.format(
                            app.appliedAt, 'dd MMM yyyy')}">
                        </td>
                        <td>
                            <span th:text="${app.status}"
                                class="badge"
                                th:classappend="
                                ${app.status.name() == 'APPLIED'}
                                ? 'bg-secondary'
                                : (${app.status.name() == 'SHORTLISTED'}
                                ? 'bg-success'
                                : (${app.status.name() == 'HIRED'}
                                ? 'bg-primary'
                                : 'bg-danger'))">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${applications.empty}">
                        <td colspan="6"
                            class="text-center text-muted py-3">
                            No applications yet.
                            <a href="/seeker/jobs">
                                Browse Jobs
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="bg-light text-center py-3 mt-4">
    <p class="mb-0 text-muted">
        © 2024 JobPortal. All rights reserved.
    </p>
</footer>
<script src="/js/main.js"></script>
</body>
</html>
