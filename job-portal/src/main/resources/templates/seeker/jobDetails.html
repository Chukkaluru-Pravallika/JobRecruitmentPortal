<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/style.css">
</head>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💼 JobPortal</a>
        <div class="ms-auto">
            <a href="/seeker/jobs"
               class="btn btn-outline-light me-2">Back to Jobs</a>
            <form th:action="@{/logout}"
      method="post"
      class="d-inline">
    <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"/>
    <button type="submit"
        class="btn btn-light">
        Logout
    </button>
</form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row">
        <!-- Job Details -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 th:text="${job.title}"></h3>
                    <h5 class="text-muted"
                        th:text="${job.company.name}"></h5>

                    <hr>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <p>📍 <strong>Location:</strong>
                                <span th:text="${job.location}"></span></p>
                            <p>💰 <strong>Salary:</strong>
                                <span th:text="${job.salary}"></span></p>
                            <p>🕒 <strong>Job Type:</strong>
                                <span th:text="${job.jobType}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p>📂 <strong>Category:</strong>
                                <span th:text="${job.category}"></span></p>
                            <p>🎓 <strong>Experience:</strong>
                                <span th:text="${job.experience}"></span></p>
                            <p>📅 <strong>Posted:</strong>
                                <span th:text="${#temporals.format(
                                    job.postedAt, 'dd MMM yyyy')}"></span></p>
                        </div>
                    </div>

                    <h5>Job Description</h5>
                    <p th:text="${job.description}"></p>
                </div>
            </div>
        </div>

        <!-- Apply Section -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5>Apply for this Job</h5>

                    <!-- Already applied -->
                    <div th:if="${hasApplied}"
                         class="alert alert-success">
                        ✅ You have already applied for this job!
                    </div>

                    <!-- Apply form -->
                    <form th:if="${!hasApplied}"
                          th:action="@{/seeker/jobs/{id}/apply(id=${job.id})}"
                          method="post">
                        <input type="hidden"
                            th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label">
                                Cover Letter (optional)
                            </label>
                            <textarea name="coverLetter"
                                class="form-control" rows="5"
                                placeholder="Why are you a good fit?">
                            </textarea>
                        </div>

                        <button type="submit"
                            class="btn btn-primary w-100">
                            Apply Now
                        </button>
                    </form>

                    <!-- Error -->
                    <div th:if="${error}"
                         class="alert alert-danger mt-2"
                         th:text="${error}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
